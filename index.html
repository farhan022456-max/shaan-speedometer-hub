<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaan Speedometer | Premium Parts</title>
    <style>
        :root {
            --primary: #0066ff;
            --dark: #1a1a1a;
            --light-bg: #f8f9fa;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--light-bg); margin: 0; padding: 0; }

        /* Header */
        .header { background: #fff; padding: 20px; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--primary); margin-bottom: 15px; }

        /* Search & Filter */
        .controls { max-width: 800px; margin: 20px auto; padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        #searchBox { padding: 12px 20px; border: 1px solid #ddd; border-radius: 30px; width: 100%; outline: none; }
        .tabs { display: flex; justify-content: center; gap: 10px; }
        .tab { padding: 8px 20px; border: 1px solid var(--primary); border-radius: 20px; cursor: pointer; color: var(--primary); font-weight: 600; }
        .tab.active { background: var(--primary); color: #fff; }

        /* Product Grid */
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .card { background: #fff; padding: 15px; border-radius: 12px; box-shadow: var(--card-shadow); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; }
        .card h3 { margin: 10px 0; font-size: 1.1rem; }
        .price { color: #d32f2f; font-weight: 800; font-size: 1.2rem; }
        .btn { display: block; width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 10px; text-align: center; text-decoration: none; }
        .btn-whatsapp { background: #25D366; color: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">SHAAN SPEEDOMETER</div>
        <div class="controls">
            <input type="text" id="searchBox" placeholder="Search bike model (e.g. Passion)..." onkeyup="filterProducts()">
            <div class="tabs">
                <div class="tab active" onclick="setCategory('all', this)">All</div>
                <div class="tab" onclick="setCategory('bike', this)">Bikes</div>
                <div class="tab" onclick="setCategory('scooty', this)">Scooty</div>
            </div>
        </div>
    </div>

    <div class="container" id="productGrid">
        <!-- Products -->
        <div class="card" data-name="passion pro" data-cat="bike">
            <img src="https://rukminim2.flixcart.com/image/480/480/jsyyufk0/speedometer/7/n/a/speedometer-for-passion-pro-samday-original-imafee7zzqvbdbhc.jpeg?q=90">
            <h3>Passion Pro</h3>
            <div class="price">₹950</div>
            <a href="https://wa.me/919999999999?text=I want Passion Pro" class="btn btn-whatsapp">Buy on WhatsApp</a>
        </div>

        <div class="card" data-name="splendor xtec" data-cat="bike">
            <img src="https://placehold.co/400x300?text=Splendor+Xtec">
            <h3>Splendor Xtec</h3>
            <div class="price">₹1,450</div>
            <a href="#" class="btn btn-whatsapp">Buy on WhatsApp</a>
        </div>

        <div class="card" data-name="activa 6g" data-cat="scooty">
            <img src="https://placehold.co/400x300?text=Activa+6G">
            <h3>Activa 6G</h3>
            <div class="price">₹900</div>
            <a href="#" class="btn btn-whatsapp">Buy on WhatsApp</a>
        </div>
    </div>

    <script>
        // Live Search Filter
        function filterProducts() {
            let input = document.getElementById('searchBox').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let card of cards) {
                let name = card.getAttribute('data-name');
                card.style.display = name.includes(input) ? "block" : "none";
            }
        }

        // Category Filter
        function setCategory(cat, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            let cards = document.getElementsByClassName('card');
            for (let card of cards) {
                if(cat === 'all' || card.getAttribute('data-cat') === cat) card.style.display = "block";
                else card.style.display = "none";
            }
        }
    </script>
</body>
</html>
